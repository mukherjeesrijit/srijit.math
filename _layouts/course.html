<!DOCTYPE html>
<html>
  {% include head.html %}

  <body>
    {% include header.html %}

    <div class="page-content">
      <div class="wrapper">
        <div class="course">

          <header class="course-header" style="background-color: {{ page.color | default: '#e7e7fb' }};">
            {% if page.icon %}
              <span class="course-icon">{{ page.icon }}</span>
            {% endif %}
            <h1 class="course-title" style="color: {{ page.title_color | default: '#5b5bd6' }};">
              {{ page.title }}
            </h1>
          </header>

          <article class="course-content">
            {{ content }}
          </article>

          <div class="course-footer-nav">
            <a class="course-back-link" href="{{ "/" | relative_url }}">&larr; All courses</a>
            <a class="course-about-link" href="{{ "/about" | relative_url }}">About &rarr;</a>
          </div>

        </div>
      </div>
    </div>

    {% include footer.html %}
    {% include foot.html %}
  </body>
</html>
