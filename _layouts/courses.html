<!DOCTYPE html>
<html>
  {% include head.html %}

  <body>
    {% include header.html %}

    <div class="page-content">
      <div class="wrapper">
        <div class="courses">

          <h1 class="page-heading">{{ page.title }}</h1>
          {{ content }}

          <div class="courses-grid">
            {% for course in site.courses %}
              {% if course.draft != true %}
                <a class="course-card" href="{{ course.url | relative_url }}" style="background-color: {{ course.color | default: '#e7e7fb' }};">
                  <h2 class="course-card-title" style="color: {{ course.title_color | default: '#5b5bd6' }};">
                    {{ course.title }}
                  </h2>
                  {% if course.icon %}
                    <span class="course-card-icon">{{ course.icon }}</span>
                  {% endif %}
                </a>
              {% endif %}
            {% endfor %}
          </div>

        </div>
      </div>
    </div>

    {% include footer.html %}
    {% include foot.html %}
  </body>
</html>
